{% extends 'crudapp/base.html' %}
{% block title %}✏️ Edit Student{% endblock title %}
{% block main_content %}
<section class="container">
    <div class="page-header">
        <h3>✏️ Edit Student Record</h3>
        <p class="text-white mb-0">Update the student information below</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-sm-6">
            <div class="glass-form">
                <div class="text-center mb-4">
                    <div class="icon-circle mx-auto" style="width: 60px; height: 60px; font-size: 1.5rem;">📝</div>
                </div>

                <form action="" method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_name" class="form-label">👤 Full Name</label>
                        <input type="text" name="name" id="id_name" class="form-control" value="{{ form.name.value }}" placeholder="Enter student name" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_roll" class="form-label">🎓 Roll Number</label>
                        <input type="text" name="roll" id="id_roll" class="form-control" value="{{ form.roll.value }}" placeholder="Enter roll number" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_city" class="form-label">📍 City</label>
                        <input type="text" name="city" id="id_city" class="form-control" value="{{ form.city.value }}" placeholder="Enter city name" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_email" class="form-label">📧 Email Address</label>
                        <input type="email" name="email" id="id_email" class="form-control" value="{{ form.email.value }}" placeholder="Enter email address" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_phone_number" class="form-label">📱 Phone Number</label>
                        <input type="tel" name="phone_number" id="id_phone_number" class="form-control" value="{{ form.phone_number.value }}" placeholder="Enter phone number" required>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-glass btn-glass-primary flex-grow-1">
                            ✨ Update
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-glass flex-grow-1 text-center">
                            ← Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock main_content %}
