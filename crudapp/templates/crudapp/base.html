{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%220%22 y=%2270%22 fill=%22%23F59E0B%22 font-size=%2238%22 font-family=%22Verdana, sans-serif%22 font-weight=%22600%22>CRUD</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'crudapp/css/base.css' %}">
    <title>{% block title %}{% endblock title%} | StudentHub</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
          <div class="logo-icon">📚</div>
          <span style="color: #fff;">StudentHub</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" style="border-color: rgba(255,255,255,0.5);">
          <span style="color: #fff;">☰</span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" style="color: #fff;" href="{% url 'home' %}">🏠 Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" style="color: #fff;" href="{% url 'add-student' %}">➕ Add Student</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    {% block main_content %}{% endblock main_content%}

    <footer class="text-center py-4" style="color: #fff; position: relative; z-index: 1;">
      <small >&copy; 2026 StudentHub. Built with ❤️ using Django</small>
    </footer>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block myscript %}{% endblock myscript%}
  </body>
</html>
